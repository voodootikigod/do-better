name: Publish to npm

# Publish is triggered ONLY by pushing a v* tag. `workflow_dispatch` is
# intentionally NOT used: a manual dispatch runs the workflow file from the
# selected ref, so a contributor could dispatch a branch whose publish.yml drops
# the environment gate and publish ungated. Tag creation is restricted to admins
# by the `release tags` ruleset (docs/github-rulesets/), so the only code that can
# trigger a publish is an admin-controlled tagged commit.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gate the publish behind a protected environment with a required reviewer and
    # a v* deployment-tag policy (provisioned by docs/github-rulesets/apply.sh).
    # Any npm credential MUST be an environment-scoped secret on this environment
    # (not a repo-level secret): that way it is unreadable from any job that does
    # not run under `npm-publish`, closing credential-exfiltration via a modified
    # workflow on a branch.
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so the ancestry check below can run

      - name: Verify tag is merged into main
        env:
          SHA: ${{ github.sha }}
        run: |
          # Refuse to publish a tag that points at a commit not reachable from
          # main — i.e. code that never passed the protected-main PR/CI gates.
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Tag commit $SHA is not an ancestor of origin/main — refusing to publish unmerged code."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        # Node 20 ships npm 10.x, which cannot use OIDC trusted publishing.
        # npm >= 11.5.1 is required to mint a registry token from the GitHub
        # id-token (the `id-token: write` permission above). Without this the
        # publish falls through to needing NODE_AUTH_TOKEN and fails ENEEDAUTH.
        # Pinned to the 11.x line (NOT @latest): npm 12 dropped Node 20 support
        # (requires node ^22.22 || ^24.15 || >=26), so `npm@latest` fails
        # EBADENGINE on this runner. 11.x has OIDC and supports Node 20.
        run: npm install -g npm@11

      - name: Verify tag matches package.json version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # The release skill commits the version bump before tagging, so the tag
          # and the committed manifest must already agree. Verify rather than
          # rewrite: a mismatch means the tag does not describe the code being
          # published, and npm provenance would attest to the wrong version.
          TAG_VERSION="${REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $REF_NAME implies version $TAG_VERSION but package.json says $PKG_VERSION."
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Install
        # ci, not install: the published artifact must be built from the
        # locked dependency tree, and a drifted lockfile should fail the
        # release rather than resolve something nobody reviewed.
        run: npm ci

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          # Bootstrap run only: set NPM_TOKEN as an ENVIRONMENT secret on
          # `npm-publish` (Settings > Environments > npm-publish > Secrets), NOT a
          # repo secret, so it cannot be read outside the gated environment. After
          # configuring npm trusted publishing for `do-better` on npmjs.com,
          # delete the secret — this var becomes empty and npm falls through to
          # OIDC trusted publishing.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
